
name: Gerar EXE

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Criar EXE
        run: |
          pyinstaller --onefile --windowed GH_Renovacao_Melhorias_1a6_Sem_Dose_Media.py

      - name: Salvar artefato
        uses: actions/upload-artifact@v4
        with:
          name: GH-Helper
          path: dist/*.exe
